# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.10.14

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system -r requirements.txt
        uv pip install --system -e .

    - name: Run data ingestion
      run: |
        python -m fraudshield.data_ingestion.data_ingestion

    - name: Run data preprocessing
      run: |
        python -m fraudshield.data_preprocessing.data_preprocessing
        # python -m fraudshield.data_preprocessing.data_preprocessing --input_data /path/to/ingested_data.csv --train_data /path/to/preprocessed_data.npy --test_data /path/to/test_data.npy

    - name: Train models
      run: |
        python -m fraudshield.model_training.train_models
        # python -m fraudshield.model_training.train_models --preprocessed_data /path/to/preprocessed_data.npy --output_dir /path/to/models/

    - name: Evaluate models
      run: |
        python -m fraudshield.model_evaluation.evaluation
        # python -m fraudshield.model_evaluation.evaluation --model_path /path/to/trained_model.pkl --test_data /path/to/test_data.npy --output_path /path/to/evaluation_report.csv

    - name: Package project
      run: |
        python -m pip install build
        python -m build

    - name: Upload package artifacts
      uses: actions/upload-artifact@v6
      with:
        name: dist
        path: dist

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.10.14

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system flake8 pylint

    - name: Lint with Flake8 and Pylint
      run: |
        flake8 src/fraudshield --max-line-length=150 --ignore=E501,W503 || true
        pylint src/fraudshield --max-line-length=150 --disable=C0111,C0103,R0913,W0718,R0914,R0917,W1203,R0915,W1514,R0902,C0415 || true

  prettier:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Install dependencies
      run: |
        npm install --global prettier

    - name: Run Prettier
      run: |
        prettier --check . || true

  deploy:
    needs: [build, lint, prettier]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Download package artifacts
      uses: actions/download-artifact@v7
      with:
        name: dist
        path: dist

    - name: Deploy to production
      run: |
        # Add your deployment steps here
        # For example, you can use a package repository or a deployment service
        # to deploy the FraudShield package to your production environment
